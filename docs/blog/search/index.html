const notesSearchIndex = [{"title":"单隐藏层 MLP 的权重空间置换对称性","url":"/blog/posts/mlp-permutation-symmetry/","date":"Jun 7, 2026","readingTime":1,"categories":["Statistics & ML Theory"],"tags":["MLP","symmetry","optimization","deep-learning"],"text":"单隐藏层 MLP 的权重空间置换对称性 证明单隐藏层 MLP 至少存在 d! 个损失值完全相同的等价解，即权重空间的置换对称性。 单隐藏层 MLP 的 $d!$ 等价解 命题 ：一个隐藏层维度为 $d$、单输出的 MLP，对任意局部最小值，至少存在 $d!$ 个损失函数值完全相同的等价解。 证明 ： 隐藏层的计算为 $h = \\sigma W 1 x + b 1 $，输出为 $\\hat{y} = w 2^\\top h + b 2$。 对隐藏层神经元的序号做任意排列（permutation），同时对应调整权重矩阵的行/列顺序： $$W 1' = P W 1,\\quad b 1' = P b 1,\\quad w 2' = P w 2$$ 其中 $P$ 是 $d \\times d$ 的置换矩阵。由于 $P^\\top P = I$： $$\\hat{y}' = P w 2 ^\\top \\sigma P W 1 x + P b 1 + b 2 = w 2^\\top P^\\top \\sigma P z $$ 如果激活函数 $\\sigma$ 是逐元素操作，则 $\\sigma P z = P \\sigma z $，于是 $\\hat{y}' = w 2^\\top P^\\top P \\sigma z = \\hat{y}$。 $d$ 个神经元有 $d!$ 种排列方式，每种对应一组不同的参数值但输出完全相同，因此损失值也完全相同。这就是 权重空间的置换对称性 。"},{"title":"OpenAI GPT 系列技术演进史 (2018 - 2026)","url":"/blog/posts/gpt-series/","date":"Jun 6, 2026","readingTime":2,"categories":["Deep Learning"],"tags":["LLM","OpenAI","GPT","Deep Learning"],"text":"OpenAI GPT 系列技术演进史 2018 2026 一篇整理 OpenAI GPT 系列模型从 GPT 1 到推理/智能体阶段的技术演进笔记。 阶段 模型 核心论文/文档 关键技术突破 : : : : 奠基 GPT 1 Improving Language Understanding... 引入 Transformer Decoder 架构；确立“预训练+微调”范式。 通用化 GPT 2 Language Models are Unsupervised... 证明 Zero shot 能力；参数量提升至 1.5B；架构优化 Pre norm 。 规模化 GPT 3 Language Models are Few Shot Learners 提出 In Context Learning Few shot ；175B 极致参数规模。 对齐 InstructGPT Training LMs to follow instructions... 引入 RLHF 基于人类反馈的强化学习 ；指令遵循能力。 多模态 GPT 4 GPT 4 Technical Report 实现图像+文本多模态输入；复杂逻辑推理与安全性飞跃。 推理 o1 Series OpenAI Blog Internal Reasoning 引入慢思考 CoT 强化学习；解决极高难度科学/代码问题。 代理/实时 GPT 5.5 GPT 5.5 System Card 自主代理能力 Agentic ；端到端实时音视频交互；极低幻觉率。 1. 奠基阶段：架构引入 2018 GPT 1: 范式确立 突破 : 放弃 RNN/LSTM，采用 Transformer Decoder 架构。 贡献 : 证明了在大规模无标签文本上进行预训练，可以学习到通用的语言特征。 2. 规模化与零样本能力 2019 2020 GPT 2: 走向通用化 突破 : 强调 Zero shot 学习。 贡献 : 模型无需微调即可通过 Prompt 执行任务，标志着模型开始具备“通用”潜力。 GPT 3: 上下文学习 突破 : In Context Learning ICL 。 贡献 : 175B 的超大规模参数产生了“涌现能力”，仅需几个示例即可完成复杂任务。 3. 对齐与交互革命 2022 2023 InstructGPT ChatGPT 基座 : 意图对齐 突破 : RLHF 基于人类反馈的强化学习 。 贡献 : 解决了模型输出“不可控”的问题，使其真正成为能够听懂人类指令的助手。 GPT 4: 多模态巅峰 突破 : 原生 多模态推理 。 贡献 : 在法律、数学等专业考试中达到人类水平，并显著增强了安全对齐机制。 4. 智能体与自主时代 2024 2026 o1 系列: 深度逻辑推理 突破 : 强化学习驱动的思维链 CoT 。 "},{"title":"模型训练与推理显存计算总结","url":"/blog/posts/model-memory-training-inference-summary/","date":"Jun 6, 2026","readingTime":9,"categories":["Research Notes"],"tags":["Deep Learning","LLM","GPU Memory","Training","Inference"],"text":"模型训练与推理显存计算总结 一份关于模型权重、梯度、Adam 状态、activation、KV cache、LoRA/QLoRA 显存估算的研究笔记。 校订说明 ：本文中的显存数字用于快速估算。实际占用会受到框架实现、并行策略、optimizer dtype、activation checkpointing、FlashAttention、quantization metadata、CUDA workspace 等因素影响。文中 GB 主要按十进制近似口径使用；按二进制口径可理解为 GiB ，数值会略有差异。 0. 总体思路 模型显存可以粗略理解为： \\ \\text{显存} \\approx \\text{模型权重} + \\text{梯度} + \\text{优化器状态} + \\text{激活值} + \\text{临时 buffer} \\ 但是训练和推理需要保存的内容不同。 训练 需要保存： 模型权重 weights 梯度 gradients 优化器状态 optimizer states forward 过程中的激活值 activations 临时 buffer 推理 通常需要保存： 模型权重 weights KV cache 少量 activation buffer runtime buffer 所以训练显存通常远大于推理显存。 1. 模型权重显存 假设模型有 \\ N\\ 个参数，每个参数占 \\ b\\ bytes，那么权重显存大约是： \\ \\boxed{ \\text{Weight Memory} = N \\times b } \\ 例如一个 7B 模型： \\ N = 7 \\times 10^9 \\ 如果使用 FP16 / BF16，每个参数占： \\ 2 \\text{ bytes} \\ 所以： \\ 7 \\times 10^9 \\times 2 = 14 \\times 10^9 \\text{ bytes} \\approx 14 \\text{ GB} \\ 因此： \\ \\boxed{ 7B \\text{ 模型用 FP16/BF16 权重约需要 } 14GB } \\ 如果按二进制口径换算，\\ 14 \\times 10^9\\ bytes 约为 \\ 13.0\\ GiB。因此看到不同工具显示 13GB 左右或 14GB 左右，通常只是单位口径不同。 常见精度对应关系： 精度 每个参数占用 7B 权重大小 : : FP32 4 bytes 28GB FP16 / BF16 2 bytes 14GB FP8 1 byte 7GB INT4 0.5 byte 3.5GB 注意：INT4 真实占用通常会略大于理论值，因为还需要保存 scale、zero point、metadata 等信息。 2. 训练显存怎么计算？ 训练时显存大致由下面几部分组成： \\ \\boxed{ \\text{Trai"}];
